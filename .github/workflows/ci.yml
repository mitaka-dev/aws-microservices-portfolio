name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Run tests
        run: ./mvnw -T 1C verify

  deploy:
    name: Deploy changed services
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "all")
          SERVICES=(user-service catalog-service order-service file-service payment-service)
          TO_BUILD=""

          if echo "$CHANGED" | grep -qE "^(pom\.xml|proto-shared/)"; then
            TO_BUILD="${SERVICES[*]}"
          elif [ "$CHANGED" = "all" ]; then
            TO_BUILD="${SERVICES[*]}"
          else
            for svc in "${SERVICES[@]}"; do
              if echo "$CHANGED" | grep -q "^${svc}/"; then
                TO_BUILD="${TO_BUILD:+$TO_BUILD }$svc"
              fi
            done
          fi

          echo "to_build=$TO_BUILD" >> "$GITHUB_OUTPUT"
          if [ -n "$TO_BUILD" ]; then
            echo "Services to deploy: $TO_BUILD"
          else
            echo "No service changes detected — skipping deploy"
          fi

      - uses: actions/setup-java@v4
        if: steps.detect.outputs.to_build != ''
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Build JARs
        if: steps.detect.outputs.to_build != ''
        run: ./mvnw -T 1C -DskipTests clean package

      - name: Configure AWS credentials
        if: steps.detect.outputs.to_build != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Build, push, and deploy
        if: steps.detect.outputs.to_build != ''
        env:
          TO_BUILD: ${{ steps.detect.outputs.to_build }}
          SHA: ${{ github.sha }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.eu-west-1.amazonaws.com"

          aws ecr get-login-password --region eu-west-1 \
            | docker login --username AWS --password-stdin "$REGISTRY"

          for svc in $TO_BUILD; do
            ECR_URL="${REGISTRY}/portfolio-dev-${svc}"

            docker build \
              -t "${ECR_URL}:${SHA}" \
              -t "${ECR_URL}:latest" \
              -f "${svc}/Dockerfile" \
              .

            docker push "${ECR_URL}:${SHA}"
            docker push "${ECR_URL}:latest"

            aws ecs update-service \
              --cluster portfolio-dev-cluster \
              --service "portfolio-dev-${svc}" \
              --force-new-deployment \
              --region eu-west-1 \
              --output json \
              | jq -r '"  ECS deploy triggered for \(.service.serviceName)"'
          done
