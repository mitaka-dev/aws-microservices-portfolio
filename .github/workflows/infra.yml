name: Infra

on:
  pull_request:
    paths:
      - 'infra/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    name: tofu plan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: '~> 1.8'

      - name: tofu fmt check
        run: tofu fmt -check -recursive infra/

      - name: tofu init
        working-directory: infra/envs/dev
        run: tofu init

      - name: tofu validate
        working-directory: infra/envs/dev
        run: tofu validate

      - name: tofu plan
        id: plan
        working-directory: infra/envs/dev
        run: tofu plan -no-color 2>&1 | tee /tmp/plan.txt
        continue-on-error: true

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('/tmp/plan.txt', 'utf8');
            const truncated = raw.length > 60000
              ? raw.substring(0, 60000) + '\n\n...[output truncated — see job logs for full plan]'
              : raw;
            const body = [
              '## OpenTofu Plan',
              '```',
              truncated,
              '```',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    name: tofu apply
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: '~> 1.8'

      - name: tofu init
        working-directory: infra/envs/dev
        run: tofu init

      - name: tofu apply
        working-directory: infra/envs/dev
        run: tofu apply -auto-approve
