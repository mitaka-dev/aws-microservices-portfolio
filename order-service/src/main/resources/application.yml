spring:
  application:
    name: order-service
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
  flyway:
    table: flyway_schema_history_order_service
    baseline-on-migrate: true
    baseline-version: 0
  autoconfigure:
    exclude:
      # CloudWatchExportAutoConfiguration references StepRegistryProperties removed in SB4.
      - io.awspring.cloud.autoconfigure.metrics.CloudWatchExportAutoConfiguration

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:userdb}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  cloud:
    aws:
      endpoint: ${LOCALSTACK_URL:http://localhost:4566}
      credentials:
        access-key: test
        secret-key: test
      region:
        static: eu-west-1

aws:
  sns:
    orders-topic-arn: arn:aws:sns:eu-west-1:000000000000:orders-events

management:
  cloudwatch:
    metrics:
      export:
        enabled: false

---
spring:
  config:
    activate:
      on-profile: aws
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:orderdb}
  cloud:
    aws:
      region:
        static: ${AWS_REGION:eu-west-1}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${COGNITO_ISSUER_URI}

aws:
  sns:
    orders-topic-arn: ${SNS_ORDERS_TOPIC_ARN}

management:
  cloudwatch:
    metrics:
      export:
        enabled: true
        namespace: Portfolio/${spring.application.name}
        step: 60s
