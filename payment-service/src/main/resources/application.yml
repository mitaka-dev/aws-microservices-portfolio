spring:
  application:
    name: payment-service
  threads:
    virtual:
      enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
  flyway:
    table: flyway_schema_history_payment_service
    baseline-on-migrate: true
    baseline-version: 0
  autoconfigure:
    exclude:
      # CloudWatchExportAutoConfiguration references StepRegistryProperties removed in SB4.
      - io.awspring.cloud.autoconfigure.metrics.CloudWatchExportAutoConfiguration
  datasource:
    hikari:
      # 256 vCPU Fargate: (2 * cores) + 1 = 5 max connections
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 3000
      max-lifetime: 1800000
      keepalive-time: 60000
      validation-timeout: 2000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:paymentdb}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}

management:
  cloudwatch:
    metrics:
      export:
        enabled: false

---
spring:
  config:
    activate:
      on-profile: aws
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:paymentdb}
  cloud:
    aws:
      region:
        static: ${AWS_REGION:eu-west-1}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${COGNITO_ISSUER_URI}

management:
  cloudwatch:
    metrics:
      export:
        enabled: true
        namespace: Portfolio/${spring.application.name}
        step: 60s
