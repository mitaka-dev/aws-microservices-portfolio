syntax = "proto3";

option java_package = "com.portfolio.proto.catalog";
option java_outer_classname = "CatalogProto";
option java_multiple_files = true;

package catalog;

service CatalogService {
  rpc GetProduct(GetProductRequest) returns (ProductResponse);
  rpc DecrementStock(DecrementStockRequest) returns (DecrementStockResponse);
  rpc IncrementStock(IncrementStockRequest) returns (IncrementStockResponse);
}

message GetProductRequest {
  string product_id = 1;
}

message ProductResponse {
  string product_id = 1;
  string name = 2;
  double price = 3;
  int32 stock = 4;
}

message DecrementStockRequest {
  string product_id = 1;
  int32 quantity = 2;
}

message DecrementStockResponse {
  bool success = 1;
  int32 remaining_stock = 2;
}

message IncrementStockRequest {
  string product_id = 1;
  int32 quantity = 2;
}

message IncrementStockResponse {
  bool success = 1;
  int32 remaining_stock = 2;
}
